<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Our Celebration ♥</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a000c;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            position: relative;
            color: #fff;
            user-select: none;
        }

        #ann-bg {
            position: fixed;
            inset: 0;
            background: #0a000c;
            z-index: 0;
            overflow: hidden;
        }

        .bg-slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            filter: brightness(0.7) saturate(0.9);
        }

        .bg-slide.active {
            opacity: 0.45;
            animation: kenburns 14s ease-out forwards;
        }

        @keyframes kenburns {
            0% {
                transform: scale(1) rotate(0deg);
            }

            100% {
                transform: scale(1.12) rotate(0.5deg);
            }
        }

        .bg-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 40% 40%, rgba(20, 0, 28, 0.35) 0%, rgba(8, 0, 12, 0.85) 100%);
            z-index: 1;
            pointer-events: none;
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #bg-canvas {
            z-index: 2;
        }

        #confetti-canvas {
            z-index: 9;
        }

        .ann-blur-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 60% 30%, transparent 30%, rgba(10, 0, 12, 0.5) 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* ── Music button ── */
        #music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            width: 52px;
            height: 52px;
            border-radius: 30px;
            background: rgba(220, 80, 130, 0.12);
            border: 1px solid rgba(255, 120, 170, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
        }

        #music-btn:hover {
            background: rgba(220, 80, 130, 0.25);
            transform: scale(1.05);
            border-color: rgba(255, 140, 190, 0.6);
            box-shadow: 0 0 25px rgba(220, 80, 130, 0.3);
        }

        .music-bars {
            display: flex;
            align-items: flex-end;
            gap: 2.5px;
            height: 22px;
        }

        .music-bar {
            width: 3px;
            background: rgba(255, 200, 220, 0.9);
            border-radius: 3px;
            transition: height 0.2s;
        }

        .bar1 {
            height: 8px;
        }

        .bar2 {
            height: 14px;
        }

        .bar3 {
            height: 10px;
        }

        .bar4 {
            height: 16px;
        }

        @keyframes bar-dance1 {

            0%,
            100% {
                height: 8px;
            }

            50% {
                height: 18px;
            }
        }

        @keyframes bar-dance2 {

            0%,
            100% {
                height: 14px;
            }

            50% {
                height: 6px;
            }
        }

        @keyframes bar-dance3 {

            0%,
            100% {
                height: 10px;
            }

            50% {
                height: 20px;
            }
        }

        @keyframes bar-dance4 {

            0%,
            100% {
                height: 16px;
            }

            50% {
                height: 7px;
            }
        }

        .music-playing .bar1 {
            animation: bar-dance1 0.65s ease-in-out infinite;
        }

        .music-playing .bar2 {
            animation: bar-dance2 0.5s ease-in-out infinite 0.1s;
        }

        .music-playing .bar3 {
            animation: bar-dance3 0.7s ease-in-out infinite 0.2s;
        }

        .music-playing .bar4 {
            animation: bar-dance4 0.55s ease-in-out infinite 0.05s;
        }

        #music-label {
            font-size: 7px;
            font-weight: 600;
            color: rgba(255, 180, 210, 0.8);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* ── Back button ── */
        .cel-back {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 100, 150, 0.2);
            border-radius: 40px;
            padding: 10px 24px;
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 210, 225, 0.8);
            cursor: pointer;
            letter-spacing: 1.2px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        .cel-back:hover {
            background: rgba(220, 80, 130, 0.2);
            border-color: rgba(220, 80, 130, 0.5);
            color: #fff;
            transform: translateX(-4px) scale(1.02);
            box-shadow: 0 4px 18px rgba(220, 80, 130, 0.25);
        }

        .cel-back i {
            font-style: normal;
            font-size: 16px;
            line-height: 1;
        }

        /* ── Main Layout ── */
        .container {
            position: relative;
            z-index: 10;
            max-width: 680px;
            width: 92%;
            padding: 2.8rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .cel-title {
            font-family: 'Dancing Script', cursive;
            font-size: 4.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(255, 77, 121, 0.5), 0 4px 20px rgba(0, 0, 0, 0.5);
            animation: glow 4s ease-in-out infinite alternate;
            line-height: 1.1;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 15px rgba(255, 77, 121, 0.5), 0 0 30px rgba(255, 77, 121, 0.2);
            }

            to {
                text-shadow: 0 0 30px rgba(255, 77, 121, 0.8), 0 0 50px rgba(255, 77, 121, 0.4);
            }
        }

        .cel-subtitle {
            font-size: 0.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 190, 215, 0.6);
            margin-top: 1rem;
            margin-bottom: 2.8rem;
            font-weight: 300;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.4rem 1.6rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .cel-msg-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(220, 80, 130, 0.18);
            border-radius: 28px;
            padding: 2rem 2.5rem;
            max-width: 500px;
            width: 100%;
            font-size: 1.05rem;
            line-height: 2;
            color: rgba(255, 220, 235, 0.9);
            font-style: italic;
            backdrop-filter: blur(16px);
            margin-bottom: 2.5rem;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            transition: transform 0.3s ease;
        }

        .cel-msg-box:hover {
            transform: scale(1.01);
        }

        .cel-msg-text {
            display: inline-block;
            width: 100%;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .cel-msg-text.fade-out {
            opacity: 0;
            transform: translateY(-8px);
        }

        .cel-msg-box::before {
            content: '“';
            position: absolute;
            top: -2px;
            left: 18px;
            font-size: 3.8rem;
            color: rgba(255, 77, 121, 0.15);
            line-height: 1;
            font-family: serif;
        }

        .cel-msg-box::after {
            content: '”';
            position: absolute;
            bottom: -12px;
            right: 18px;
            font-size: 3.8rem;
            color: rgba(255, 77, 121, 0.15);
            line-height: 1;
            font-family: serif;
        }

        .cel-hearts {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .heart-icon {
            width: 24px;
            height: 24px;
            fill: #ff4d79;
            filter: drop-shadow(0 0 6px rgba(255, 77, 121, 0.6));
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            animation: heartPulseStaggered 2s infinite ease-in-out;
        }

        .heart-icon:hover {
            transform: scale(1.3) rotate(15deg);
            filter: drop-shadow(0 0 12px rgba(255, 77, 121, 0.95));
            fill: #ff1a53;
        }

        .heart-icon:nth-child(1) {
            animation-delay: 0.0s;
        }

        .heart-icon:nth-child(2) {
            animation-delay: 0.2s;
        }

        .heart-icon:nth-child(3) {
            animation-delay: 0.4s;
        }

        .heart-icon:nth-child(4) {
            animation-delay: 0.6s;
        }

        .heart-icon:nth-child(5) {
            animation-delay: 0.8s;
        }

        @keyframes heartPulseStaggered {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 6px rgba(255, 77, 121, 0.6));
            }

            50% {
                transform: scale(1.22);
                filter: drop-shadow(0 0 14px rgba(255, 77, 121, 0.9));
            }
        }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            .cel-title {
                font-size: 3.2rem;
            }

            .cel-subtitle {
                font-size: 0.65rem;
                letter-spacing: 4px;
                margin-bottom: 2rem;
                padding: 0.3rem 1rem;
            }

            .cel-msg-box {
                padding: 1.5rem 1.8rem;
                font-size: 0.9rem;
                line-height: 1.8;
                border-radius: 20px;
            }

            .cel-msg-box::before,
            .cel-msg-box::after {
                font-size: 2.8rem;
            }

            .cel-back {
                padding: 6px 14px;
                font-size: 11px;
                top: 14px;
                left: 14px;
            }

            #music-btn {
                width: 44px;
                height: 44px;
                top: 14px;
                right: 14px;
            }

            .music-bars {
                height: 18px;
                gap: 2px;
            }

            .music-bar {
                width: 2.5px;
            }
        }

        @media (max-width: 380px) {
            .cel-title {
                font-size: 2.6rem;
            }

            .cel-msg-box {
                padding: 1.2rem 1.2rem;
                font-size: 0.8rem;
            }
        }

        /* ── Audio Prompt Toast ── */
        #audio-prompt {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(0);
            z-index: 1000;
            background: rgba(220, 80, 130, 0.15);
            border: 1px solid rgba(255, 120, 170, 0.35);
            border-radius: 40px;
            padding: 10px 24px;
            font-size: 13px;
            color: rgba(255, 210, 225, 0.9);
            letter-spacing: 1px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: opacity 0.5s, transform 0.5s, visibility 0.5s;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
        }

        #audio-prompt.show {
            opacity: 1;
            visibility: visible;
            animation: bounce-gentle 2s infinite ease-in-out;
        }

        #audio-prompt.hide {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            visibility: hidden;
        }

        @keyframes bounce-gentle {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-6px); }
        }
    </style>
</head>

<body>
    <div id="ann-bg">
        <div class="bg-overlay"></div>
    </div>
    <canvas id="bg-canvas"></canvas>
    <div class="ann-blur-overlay"></div>
    <canvas id="confetti-canvas"></canvas>

    <!-- Navigation -->
    <a href="index.html" class="cel-back"><i>←</i> Back</a>

    <!-- Music toggle -->
    <div id="music-btn" onclick="toggleMusic()" title="Toggle music">
        <div class="music-bars" id="music-bars">
            <div class="music-bar bar1"></div>
            <div class="music-bar bar2"></div>
            <div class="music-bar bar3"></div>
            <div class="music-bar bar4"></div>
        </div>
        <div id="music-label">BGM</div>
    </div>

    <!-- Celebration Content -->
    <div class="container" onclick="triggerHeartBurst(event)" title="Click anywhere for hearts! ♥">
        <h1 class="cel-title">Happy Anniversary</h1>
        <div class="cel-subtitle">You & Me, Always · 8 August 2026</div>

        <div class="cel-msg-box">
            <span class="cel-msg-text">
                Every love story is beautiful, but ours is my favourite.<br>
                Here's to another year of laughter, love, and everything in between.
            </span>
        </div>

        <div class="cel-hearts">
            <svg class="heart-icon" viewBox="0 0 32 29.6">
                <path
                    d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2 c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z" />
            </svg>
            <svg class="heart-icon" viewBox="0 0 32 29.6">
                <path
                    d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2 c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z" />
            </svg>
            <svg class="heart-icon" viewBox="0 0 32 29.6">
                <path
                    d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2 c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z" />
            </svg>
            <svg class="heart-icon" viewBox="0 0 32 29.6">
                <path
                    d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2 c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z" />
            </svg>
            <svg class="heart-icon" viewBox="0 0 32 29.6">
                <path
                    d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2 c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z" />
            </svg>
        </div>
    </div>

    <script>
        (function () {
            /* ─── Floating Particles Canvas ─── */
            const bgCanvas = document.getElementById('bg-canvas');
            const bgCtx = bgCanvas.getContext('2d');
            const particles = [];

            function resize() {
                bgCanvas.width = window.innerWidth;
                bgCanvas.height = window.innerHeight;
                confettiCanvas.width = window.innerWidth;
                confettiCanvas.height = window.innerHeight;
            }

            function drawHeart(c, x, y, size) {
                c.save();
                c.translate(x, y);
                c.scale(size / 10, size / 10);
                c.beginPath();
                c.moveTo(0, -3);
                c.bezierCurveTo(5, -8, 10, -3, 0, 5);
                c.bezierCurveTo(-10, -3, -5, -8, 0, -3);
                c.closePath();
                c.restore();
            }

            window.addEventListener('resize', resize);

            function initBgParticles() {
                particles.length = 0;
                const count = Math.min(15, Math.floor(window.innerWidth / 50));
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * bgCanvas.width,
                        y: Math.random() * bgCanvas.height,
                        size: Math.random() * 2.5 + 1.2,
                        speedY: -(Math.random() * 0.3 + 0.1),
                        speedX: (Math.random() - 0.5) * 0.15,
                        opacity: Math.random() * 0.4 + 0.1,
                        isHeart: Math.random() > 0.5
                    });
                }
            }

            function animateBgParticles() {
                bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                for (const p of particles) {
                    bgCtx.save();
                    bgCtx.globalAlpha = p.opacity;
                    bgCtx.fillStyle = 'hsl(' + (330 + Math.random() * 20) + ', 85%, 70%)';
                    if (p.isHeart) {
                        drawHeart(bgCtx, p.x, p.y, p.size * 3.8);
                        bgCtx.fill();
                    } else {
                        bgCtx.beginPath();
                        bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        bgCtx.fill();
                    }
                    bgCtx.restore();
                    p.x += p.speedX;
                    p.y += p.speedY;
                    if (p.y < -20) {
                        p.y = bgCanvas.height + 20;
                        p.x = Math.random() * bgCanvas.width;
                    }
                    if (p.x < -20) p.x = bgCanvas.width + 20;
                    if (p.x > bgCanvas.width + 20) p.x = -20;
                }
                requestAnimationFrame(animateBgParticles);
            }

            /* ─── Confetti System ─── */
            const confettiCanvas = document.getElementById('confetti-canvas');
            const cctx = confettiCanvas.getContext('2d');
            const confetti = [];
            let confettiRunning = true;

            function startConfetti() {
                confetti.length = 0;
                const count = Math.min(12, Math.floor(window.innerWidth / 60));
                for (let i = 0; i < count; i++) {
                    confetti.push({
                        x: Math.random() * confettiCanvas.width,
                        y: Math.random() * confettiCanvas.height - confettiCanvas.height,
                        size: Math.random() * 5 + 2.5,
                        color: ['#ff4d79', '#ff6b9d', '#ff99bb', '#ffcce0', '#e040fb', '#ffffff', '#ffb3d1', '#ff1a53'][Math.floor(Math.random() * 8)],
                        speedY: Math.random() * 1.5 + 0.8,
                        speedX: (Math.random() - 0.5) * 1.0,
                        rotation: Math.random() * 360,
                        rotSpeed: (Math.random() - 0.5) * 3,
                        isHeart: Math.random() > 0.45
                    });
                }
                animateConfetti();
            }

            function animateConfetti() {
                if (!confettiRunning) return;
                cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                for (const p of confetti) {
                    cctx.save();
                    cctx.translate(p.x, p.y);
                    cctx.rotate(p.rotation * Math.PI / 180);
                    cctx.fillStyle = p.color;
                    cctx.globalAlpha = 0.9;
                    if (p.isHeart) {
                        drawHeart(cctx, 0, 0, p.size * 2.8);
                        cctx.fill();
                    } else {
                        cctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
                    }
                    cctx.restore();
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.rotation += p.rotSpeed;
                    if (p.y > confettiCanvas.height + 20) {
                        p.y = -20;
                        p.x = Math.random() * confettiCanvas.width;
                    }
                    if (p.x < -20) p.x = confettiCanvas.width + 20;
                    if (p.x > confettiCanvas.width + 20) p.x = -20;
                }
                requestAnimationFrame(animateConfetti);
            }

            // Click interaction heart burst on the container
            window.triggerHeartBurst = function (e) {
                const container = document.querySelector('.container');
                const rect = container.getBoundingClientRect();
                const x = e.clientX || (rect.left + rect.width / 2);
                const y = e.clientY || (rect.top + rect.height / 2);

                for (let i = 0; i < 8; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 4 + 2;
                    confetti.push({
                        x: x,
                        y: y,
                        size: Math.random() * 5 + 2.5,
                        color: ['#ff4d79', '#ff6b9d', '#ff1a53', '#e040fb', '#ffffff', '#ffb3d1'][Math.floor(Math.random() * 6)],
                        speedY: Math.sin(angle) * speed * 0.5,
                        speedX: Math.cos(angle) * speed * 0.5,
                        rotation: Math.random() * 360,
                        rotSpeed: (Math.random() - 0.5) * 8,
                        isHeart: true
                    });
                }
                // also add a few extra sparkles
                for (let i = 0; i < 2; i++) {
                    confetti.push({
                        x: x + (Math.random() - 0.5) * 40,
                        y: y + (Math.random() - 0.5) * 40,
                        size: Math.random() * 3 + 1.5,
                        color: '#ffffff',
                        speedY: (Math.random() - 0.5) * 2,
                        speedX: (Math.random() - 0.5) * 2,
                        rotation: Math.random() * 360,
                        rotSpeed: (Math.random() - 0.5) * 5,
                        isHeart: false
                    });
                }
            };

            /* ─── Background Slideshow ─── */
            /* --- Slideshow Data Start --- */
            const slidesData = [
                'assets/ChatGPT Image Feb 8, 2026, 09_33_37 PM.webp',
                'assets/ChatGPT Image May 31, 2026, 10_43_28 PM.webp',
                'assets/IMG-20241126-WA0052.webp',

            ];
            /* --- Slideshow Data End --- */
            let currentSlideIndex = 0;
            const slideElements = [];
            let shuffledIndices = [];

            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            function loadSlideImage(slideEl) {
                if (!slideEl) return;
                const src = slideEl.getAttribute('data-src');
                if (src) {
                    slideEl.style.backgroundImage = `url('${src}')`;
                    slideEl.removeAttribute('data-src'); // mark as loaded
                }
            }

            function getSlideAtShuffledIndex(index) {
                const actualIndex = shuffledIndices[index % shuffledIndices.length];
                return slideElements[actualIndex];
            }

            function initSlideshow() {
                const bgContainer = document.getElementById('ann-bg');
                slidesData.forEach((src) => {
                    const slide = document.createElement('div');
                    slide.className = 'bg-slide';
                    slide.setAttribute('data-src', src);
                    bgContainer.insertBefore(slide, bgContainer.firstChild);
                    slideElements.push(slide);
                });
                
                if (slideElements.length > 0) {
                    shuffledIndices = Array.from({length: slideElements.length}, (_, i) => i);
                    shuffle(shuffledIndices);
                    currentSlideIndex = 0;
                    
                    const firstSlide = getSlideAtShuffledIndex(currentSlideIndex);
                    loadSlideImage(firstSlide);
                    firstSlide.classList.add('active');
                    
                    // Preload the second slide immediately
                    if (slideElements.length > 1) {
                        const secondSlide = getSlideAtShuffledIndex(currentSlideIndex + 1);
                        loadSlideImage(secondSlide);
                    }
                    
                    if (slidesData.length > 1) {
                        setInterval(nextSlide, 7000);
                    }
                }
            }

            function nextSlide() {
                if (slideElements.length === 0) return;
                
                const currentSlide = getSlideAtShuffledIndex(currentSlideIndex);
                currentSlide.classList.remove('active');
                
                currentSlideIndex++;
                if (currentSlideIndex >= shuffledIndices.length) {
                    const lastSlideId = shuffledIndices[shuffledIndices.length - 1];
                    shuffle(shuffledIndices);
                    if (shuffledIndices[0] === lastSlideId && shuffledIndices.length > 1) {
                        [shuffledIndices[0], shuffledIndices[shuffledIndices.length - 1]] = [shuffledIndices[shuffledIndices.length - 1], shuffledIndices[0]];
                    }
                    currentSlideIndex = 0;
                }
                
                const nextSlideEl = getSlideAtShuffledIndex(currentSlideIndex);
                loadSlideImage(nextSlideEl);
                nextSlideEl.classList.add('active');
                
                // Preload the next one in the background (currentSlideIndex + 1)
                if (slideElements.length > 1) {
                    const preloadSlideEl = getSlideAtShuffledIndex(currentSlideIndex + 1);
                    loadSlideImage(preloadSlideEl);
                }
            }

            /* ─── Background Music (BGM) ─── */
            let bgMusic = new Audio('song/song.mp3');
            bgMusic.loop = true;
            bgMusic.volume = 0.45;
            let isPlaying = false, musicStarted = false;

            function startMusic() {
                if (isPlaying) return;
                isPlaying = true;
                musicStarted = true;
                bgMusic.play().then(() => {
                    document.getElementById('music-bars').classList.add('music-playing');
                    document.getElementById('music-label').textContent = 'ON';
                    
                    // Hide audio prompt toast if visible
                    const prompt = document.getElementById('audio-prompt');
                    if (prompt) {
                        prompt.classList.remove('show');
                        prompt.classList.add('hide');
                    }
                }).catch(err => {
                    console.log("Playback prevented: " + err);
                    isPlaying = false;
                    musicStarted = false;
                    
                    // Show audio prompt toast
                    const prompt = document.getElementById('audio-prompt');
                    if (prompt) {
                        prompt.classList.remove('hide');
                        prompt.classList.add('show');
                    }
                });
            }

            function stopMusic() {
                if (!isPlaying) return;
                isPlaying = false;
                bgMusic.pause();
                document.getElementById('music-bars').classList.remove('music-playing');
                document.getElementById('music-label').textContent = 'OFF';
            }

            window.toggleMusic = function () {
                isPlaying ? stopMusic() : startMusic();
            };

            /* Auto-start on first interaction */
            function initInteraction() {
                if (!musicStarted) startMusic();
                const prompt = document.getElementById('audio-prompt');
                if (prompt && !prompt.classList.contains('hide')) {
                    prompt.classList.remove('show');
                    prompt.classList.add('hide');
                }
                document.removeEventListener('click', initInteraction);
                document.removeEventListener('keydown', initInteraction);
                document.removeEventListener('touchstart', initInteraction);
            }
            document.addEventListener('click', initInteraction);
            document.addEventListener('keydown', initInteraction);
            document.addEventListener('touchstart', initInteraction);

            // Try silent autoplay after a short delay
            setTimeout(() => { if (!musicStarted) startMusic(); }, 400);

            let loveSlides = [];
            let currentLoveSlideIndex = 0;
            let loveInterval = null;

            function parseLoveLines(text) {
                const paragraphs = text.split(/\r?\n\r?\n+/);
                const slides = [];

                paragraphs.forEach(para => {
                    const lines = para.split(/\r?\n/)
                        .map(line => line.trim())
                        .filter(line => line.length > 0);

                    if (lines.length === 0) return;

                    // Chunk lines in pairs of 2
                    for (let i = 0; i < lines.length; i += 2) {
                        const chunk = lines.slice(i, i + 2);
                        slides.push(chunk.join('<br>'));
                    }
                });

                return slides;
            }

            function updateLoveText(newHtml) {
                const msgBox = document.querySelector('.cel-msg-box');
                let textEl = msgBox.querySelector('.cel-msg-text');
                if (!textEl) {
                    msgBox.innerHTML = `<span class="cel-msg-text">${msgBox.innerHTML}</span>`;
                    textEl = msgBox.querySelector('.cel-msg-text');
                }

                textEl.classList.add('fade-out');

                setTimeout(() => {
                    textEl.innerHTML = newHtml;
                    textEl.classList.remove('fade-out');
                }, 600);
            }

            function nextLoveSlide() {
                if (loveSlides.length <= 1) return;
                currentLoveSlideIndex = (currentLoveSlideIndex + 1) % loveSlides.length;
                updateLoveText(loveSlides[currentLoveSlideIndex]);
            }

            function loadLoveMsg() {
                fetch('love.txt')
                    .then(response => response.text())
                    .then(text => {
                        if (text.trim()) {
                            loveSlides = parseLoveLines(text);
                            if (loveSlides.length > 0) {
                                const msgBox = document.querySelector('.cel-msg-box');
                                msgBox.innerHTML = `<span class="cel-msg-text">${loveSlides[0]}</span>`;
                                currentLoveSlideIndex = 0;

                                if (loveSlides.length > 1) {
                                    if (loveInterval) clearInterval(loveInterval);
                                    loveInterval = setInterval(nextLoveSlide, 8000);
                                }
                            }
                        }
                    })
                    .catch(err => {
                        console.log("Note: Running locally or love.txt load failed. Using default message.", err);
                        const msgBox = document.querySelector('.cel-msg-box');
                        // Use default HTML text in the page
                        const defaultHtml = msgBox.innerHTML;
                        const rawText = defaultHtml.replace(/<span[^>]*>/g, '').replace(/<\/span>/g, '').replace(/<br\s*\/?>/gi, '\n');
                        loveSlides = parseLoveLines(rawText);
                        if (loveSlides.length > 0) {
                            msgBox.innerHTML = `<span class="cel-msg-text">${loveSlides[0]}</span>`;
                            currentLoveSlideIndex = 0;
                            if (loveSlides.length > 1) {
                                if (loveInterval) clearInterval(loveInterval);
                                loveInterval = setInterval(nextLoveSlide, 8000);
                            }
                        }
                    });
            }

            // Init everything
            resize();
            initBgParticles();
            animateBgParticles();
            startConfetti();
            initSlideshow();
            loadLoveMsg();

        })();
    </script>
