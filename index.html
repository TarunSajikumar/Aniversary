<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Anniversary ♥</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0010;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        #ann-root {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #ann-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1a0010 0%, #3d0030 30%, #1a0520 60%, #0d0d1a 100%);
            z-index: 0;
        }

        canvas#ann-canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }


        .ann-blur-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        /* ── Music button ── */
        #music-btn {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 100;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(220, 80, 130, 0.15);
            border: 1px solid rgba(220, 80, 130, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-direction: column;
            gap: 2px;
            transition: background 0.2s, transform 0.2s;
            backdrop-filter: blur(8px);
        }

        #music-btn:hover {
            background: rgba(220, 80, 130, 0.3);
            transform: scale(1.08);
        }

        .music-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 20px;
        }

        .music-bar {
            width: 3px;
            background: rgba(255, 180, 210, 0.9);
            border-radius: 2px;
        }

        .bar1 {
            height: 8px;
        }

        .bar2 {
            height: 14px;
        }

        .bar3 {
            height: 10px;
        }

        .bar4 {
            height: 16px;
        }

        @keyframes bar-dance1 {

            0%,
            100% {
                height: 8px
            }

            50% {
                height: 16px
            }
        }

        @keyframes bar-dance2 {

            0%,
            100% {
                height: 14px
            }

            50% {
                height: 6px
            }
        }

        @keyframes bar-dance3 {

            0%,
            100% {
                height: 10px
            }

            50% {
                height: 18px
            }
        }

        @keyframes bar-dance4 {

            0%,
            100% {
                height: 16px
            }

            50% {
                height: 8px
            }
        }

        .music-playing .bar1 {
            animation: bar-dance1 0.6s ease-in-out infinite;
        }

        .music-playing .bar2 {
            animation: bar-dance2 0.5s ease-in-out infinite 0.1s;
        }

        .music-playing .bar3 {
            animation: bar-dance3 0.7s ease-in-out infinite 0.2s;
        }

        .music-playing .bar4 {
            animation: bar-dance4 0.55s ease-in-out infinite 0.05s;
        }

        #music-label {
            font-size: 8px;
            color: rgba(255, 160, 190, 0.7);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* ── Main content ── */
        .ann-content {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 600px;
        }

        .ann-hearts-row {
            font-size: 24px;
            letter-spacing: 8px;
            margin-bottom: 0.75rem;
            opacity: 0.85;
        }

        .ann-label {
            font-size: 11px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 180, 200, 0.5);
            margin-bottom: 0.8rem;
        }

        .ann-title {
            font-family: 'Dancing Script', cursive;
            font-size: 4.4rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.6rem;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255, 77, 121, 0.6), 0 2px 10px rgba(0, 0, 0, 0.5);
            line-height: 1.1;
        }

        .ann-subtitle {
            font-size: 0.8rem;
            color: rgba(255, 190, 215, 0.6);
            margin-bottom: 2.8rem;
            letter-spacing: 4px;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.4rem 1.6rem;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
        }

        /* ── Timer ── */
        .ann-timer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .ann-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ann-num {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 100, 150, 0.2);
            border-radius: 16px;
            padding: 16px 0;
            width: 92px;
            font-size: 46px;
            font-weight: 400;
            color: #fff;
            line-height: 1;
            letter-spacing: -0.5px;
            position: relative;
            overflow: hidden;
            animation: pulse-glow 3s ease-in-out infinite;
            backdrop-filter: blur(10px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }

        .ann-num:hover {
            transform: scale(1.06);
            box-shadow: 0 0 25px rgba(255, 100, 150, 0.35);
            border-color: rgba(255, 120, 170, 0.5);
        }

        .ann-num::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(220, 80, 120, 0.14) 0%, rgba(180, 40, 100, 0.04) 100%);
        }

        .ann-uname {
            margin-top: 10px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 180, 210, 0.6);
        }

        .ann-sep {
            font-size: 36px;
            color: rgba(255, 100, 150, 0.4);
            margin-bottom: 36px;
            line-height: 1;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(220, 80, 130, 0);
            }

            50% {
                box-shadow: 0 0 20px 5px rgba(220, 80, 130, 0.18);
            }
        }

        /* ── Date chip ── */
        .ann-date-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(220, 80, 130, 0.1);
            border: 1px solid rgba(220, 80, 130, 0.2);
            border-radius: 30px;
            padding: 7px 20px;
            font-size: 12px;
            color: rgba(255, 190, 210, 0.75);
            letter-spacing: 1px;
            margin-bottom: 1.75rem;
        }

        /* ── Message ── */
        .ann-message {
            font-size: 13px;
            color: rgba(255, 200, 220, 0.45);
            font-style: italic;
            letter-spacing: 0.5px;
            transition: opacity 0.5s;
        }

        /* ── Arrived section ── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes heartBeat {

            0%,
            100% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.16);
            }

            50% {
                transform: scale(1);
            }

            75% {
                transform: scale(1.09);
            }
        }

        .ann-arrived-section {
            display: none;
            animation: fadeInUp 0.9s ease forwards;
        }

        .ann-arrived-emoji {
            font-size: 58px;
            display: block;
            margin-bottom: 1rem;
            animation: heartBeat 1.6s ease-in-out infinite;
        }

        .ann-arrived-title {
            font-size: 32px;
            font-weight: 400;
            color: #fff;
            margin-bottom: 0.4rem;
        }

        .ann-arrived-sub {
            font-size: 14px;
            color: rgba(255, 180, 210, 0.6);
            letter-spacing: 2px;
            margin-bottom: 2.25rem;
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        #open-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #c8365a 0%, #e05585 50%, #c8365a 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            letter-spacing: 1px;
            animation: shimmer 3s ease infinite;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #open-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 36px rgba(220, 80, 130, 0.5);
        }

        #open-btn:active {
            transform: scale(0.97);
        }

        /* ── Welcome Overlay ── */
        #ann-welcome-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: radial-gradient(circle at center, #1a001a 0%, #050009 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
            backdrop-filter: blur(15px);
        }

        #ann-welcome-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 100, 150, 0.2);
            border-radius: 28px;
            padding: 3.5rem 2rem;
            text-align: center;
            max-width: 420px;
            width: 90%;
            backdrop-filter: blur(25px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            animation: welcome-pulse 4s infinite ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes welcome-pulse {
            0%, 100% {
                box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7);
                border-color: rgba(255, 100, 150, 0.25);
            }
            50% {
                box-shadow: 0 24px 60px rgba(255, 100, 150, 0.15);
                border-color: rgba(255, 100, 150, 0.5);
            }
        }

        .welcome-heart-container {
            position: relative;
            cursor: pointer;
            margin-bottom: 2rem;
        }

        .welcome-heart {
            font-size: 4.8rem;
            color: #ff4d79;
            filter: drop-shadow(0 0 15px rgba(255, 77, 121, 0.75));
            animation: welcome-heartbeat 1.4s infinite cubic-bezier(0.25, 0.8, 0.25, 1);
            display: inline-block;
            transition: transform 0.2s;
        }

        .welcome-heart-container:hover .welcome-heart {
            transform: scale(1.15);
            filter: drop-shadow(0 0 25px rgba(255, 77, 121, 0.95));
        }

        @keyframes welcome-heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.12); }
            50% { transform: scale(1); }
            75% { transform: scale(1.07); }
        }

        .welcome-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.8rem;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(255, 77, 121, 0.6);
        }

        .welcome-text {
            font-size: 0.85rem;
            color: rgba(255, 190, 215, 0.6);
            margin-bottom: 2.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .welcome-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #c8365a 0%, #e05585 50%, #c8365a 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 50px;
            padding: 14px 45px;
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            box-shadow: 0 6px 20px rgba(220, 80, 130, 0.35);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: shimmer 3s ease infinite;
        }

        .welcome-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(220, 80, 130, 0.55);
        }

        .welcome-btn:active {
            transform: scale(0.97);
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .ann-num {
                width: 66px;
                font-size: 30px;
                padding: 12px 0;
                border-radius: 10px;
            }

            .ann-sep {
                font-size: 22px;
                margin-bottom: 22px;
            }

            .ann-title {
                font-size: 24px;
            }


        }
    </style>
</head>

<body>

    <!-- Welcome Overlay -->
    <div id="ann-welcome-overlay" onclick="dismissWelcome()">
        <div class="welcome-card" onclick="event.stopPropagation()">
            <div class="welcome-heart-container" onclick="dismissWelcome()">
                <div class="welcome-heart">♥</div>
            </div>
            <h1 class="welcome-title">Our Anniversary</h1>
            <p class="welcome-text">Tap to Open Our Story</p>
            <button class="welcome-btn" onclick="dismissWelcome()">Enter ♥</button>
        </div>
    </div>

    <div id="ann-root">
        <div id="ann-bg"></div>
        <canvas id="ann-canvas"></canvas>
        <div class="ann-blur-overlay"></div>

        <!-- Music toggle -->
        <div id="music-btn" onclick="toggleMusic()" title="Toggle music">
            <div class="music-bars" id="music-bars">
                <div class="music-bar bar1"></div>
                <div class="music-bar bar2"></div>
                <div class="music-bar bar3"></div>
                <div class="music-bar bar4"></div>
            </div>
            <div id="music-label">BGM</div>
        </div>

        <!-- Main countdown page -->
        <div class="ann-content" id="main-page">
            <div class="ann-hearts-row">♥ ♥ ♥</div>
            <div class="ann-label">Anniversary Countdown</div>
            <div class="ann-title">Our Special Day</div>
            <div class="ann-subtitle">8th August, 2026</div>

            <div class="ann-timer" id="ann-timer">
                <div class="ann-unit">
                    <div class="ann-num" id="cd-days">00</div>
                    <div class="ann-uname">Days</div>
                </div>
                <div class="ann-sep">:</div>
                <div class="ann-unit">
                    <div class="ann-num" id="cd-hours">00</div>
                    <div class="ann-uname">Hours</div>
                </div>
                <div class="ann-sep">:</div>
                <div class="ann-unit">
                    <div class="ann-num" id="cd-mins">00</div>
                    <div class="ann-uname">Minutes</div>
                </div>
                <div class="ann-sep">:</div>
                <div class="ann-unit">
                    <div class="ann-num" id="cd-secs">00</div>
                    <div class="ann-uname">Seconds</div>
                </div>
            </div>

            <div class="ann-date-chip"><span>♥</span><span>8 August 2026 · 12:00 AM</span></div>

            <!-- Shown when countdown ends -->
            <div class="ann-arrived-section" id="arrived-section">
                <span class="ann-arrived-emoji">💕</span>
                <div class="ann-arrived-title">Happy Anniversary!</div>
                <div class="ann-arrived-sub">Today is our special day</div>
                <button id="open-btn" onclick="openCelebration()">♥ &nbsp; Open Our Special Day</button>
            </div>

            <div class="ann-message" id="ann-msg">Every second brings us closer together...</div>
        </div>

    </div>

    <script>
        (function () {
            /* ─── Countdown ─── */
            const target = new Date('2026-08-08T00:00:00');
            let arrived = false;

            function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

            const phrases = [
                'Every second brings us closer together...',
                'Love grows stronger with every heartbeat...',
                'Counting down to our perfect moment...',
                'Time flies when you\'re in love...'
            ];

            function tick() {
                const diff = target - new Date();
                if (diff <= 0 && !arrived) {
                    arrived = true;
                    document.getElementById('ann-timer').style.display = 'none';
                    document.getElementById('ann-msg').style.display = 'none';
                    document.getElementById('arrived-section').style.display = 'block';
                    return;
                }
                if (!arrived) {
                    const s = Math.floor(diff / 1000);
                    document.getElementById('cd-days').textContent = pad(Math.floor(s / 86400));
                    document.getElementById('cd-hours').textContent = pad(Math.floor((s % 86400) / 3600));
                    document.getElementById('cd-mins').textContent = pad(Math.floor((s % 3600) / 60));
                    document.getElementById('cd-secs').textContent = pad(s % 60);
                    document.getElementById('ann-msg').textContent = phrases[Math.floor(Date.now() / 8000) % phrases.length];
                }
            }
            tick();
            setInterval(tick, 1000);

            /* ─── Celebration page ─── */
            window.openCelebration = function () {
                window.location.href = 'special_day.html';
            };

            /* ─── Floating particles (main bg) ─── */
            const canvas = document.getElementById('ann-canvas');
            const ctx = canvas.getContext('2d');
            const particles = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function drawHeart(c, x, y, size) {
                c.save(); c.translate(x, y); c.scale(size / 10, size / 10);
                c.beginPath(); c.moveTo(0, -3);
                c.bezierCurveTo(5, -8, 10, -3, 0, 5);
                c.bezierCurveTo(-10, -3, -5, -8, 0, -3);
                c.closePath(); c.restore();
            }

            resize();
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 3 + 1,
                    speedY: -(Math.random() * 0.45 + 0.1),
                    speedX: (Math.random() - 0.5) * 0.25,
                    opacity: Math.random() * 0.55 + 0.08,
                    isHeart: Math.random() > 0.58
                });
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (const p of particles) {
                    ctx.save();
                    ctx.globalAlpha = p.opacity;
                    ctx.fillStyle = 'hsl(' + (328 + Math.random() * 28) + ',78%,68%)';
                    if (p.isHeart) { drawHeart(ctx, p.x, p.y, p.size * 4); ctx.fill(); }
                    else { ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); }
                    ctx.restore();
                    p.x += p.speedX;
                    p.y += p.speedY;
                    if (p.y < -12) { p.y = canvas.height + 12; p.x = Math.random() * canvas.width; }
                }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();


            window.addEventListener('resize', resize);

            /* ─── Web Audio BGM ─── */
            let bgMusic = new Audio('song/song.mp3');
            bgMusic.loop = true;
            bgMusic.volume = 0.5; // Moderate volume
            let isPlaying = false, musicStarted = false;

            function startMusic() {
                if (isPlaying) return;
                isPlaying = true;
                musicStarted = true;
                bgMusic.play().then(() => {
                    document.getElementById('music-bars').classList.add('music-playing');
                    document.getElementById('music-label').textContent = 'ON';
                }).catch(err => {
                    console.log("Playback prevented by browser: " + err);
                    isPlaying = false;
                    musicStarted = false;
                });
            }

            function stopMusic() {
                if (!isPlaying) return;
                isPlaying = false;
                bgMusic.pause();
                document.getElementById('music-bars').classList.remove('music-playing');
                document.getElementById('music-label').textContent = 'OFF';
            }

            window.toggleMusic = function () { isPlaying ? stopMusic() : startMusic(); };

            window.dismissWelcome = function () {
                startMusic();
                
                // Remove interaction listeners since music is started
                document.removeEventListener('click', initInteraction);
                document.removeEventListener('keydown', initInteraction);
                document.removeEventListener('touchstart', initInteraction);

                const overlay = document.getElementById('ann-welcome-overlay');
                if (overlay) {
                    overlay.classList.add('fade-out');
                    setTimeout(() => {
                        overlay.remove();
                    }, 800);
                }
            };

            /* Auto-start on first interaction (browser policy) */
            function initInteraction() {
                if (!musicStarted) startMusic();
                // Also remove the overlay if they interact outside of it
                const overlay = document.getElementById('ann-welcome-overlay');
                if (overlay && !overlay.classList.contains('fade-out')) {
                    overlay.classList.add('fade-out');
                    setTimeout(() => overlay.remove(), 800);
                }
                document.removeEventListener('click', initInteraction);
                document.removeEventListener('keydown', initInteraction);
                document.removeEventListener('touchstart', initInteraction);
            }
            document.addEventListener('click', initInteraction);
            document.addEventListener('keydown', initInteraction);
            document.addEventListener('touchstart', initInteraction);

            /* Try silent autoplay immediately */
            setTimeout(() => { if (!musicStarted) startMusic(); }, 300);

        })();
    </script>
</body>

</html>
